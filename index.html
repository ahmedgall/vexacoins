<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Win100 | بوابة الأبطال</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Outfit:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #D4AF37; --accent: #FFD700; --bg: #000000; --card: rgba(18, 18, 18, 0.98); --border: rgba(212, 175, 55, 0.25); --text-dim: #94a3b8; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: #fff; font-family: 'Cairo', sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; background-image: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); }
        .auth-container { width: 90%; max-width: 420px; animation: fadeIn 0.8s ease-out; }
        .brand { text-align: center; margin-bottom: 30px; }
        .brand h1 { font-family: 'Outfit', sans-serif; font-size: 55px; margin: 0; background: linear-gradient(135deg, #FFD700, #B8860B); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .auth-card { background: var(--card); padding: 35px; border-radius: 30px; border: 1px solid var(--border); box-shadow: 0 25px 50px rgba(0,0,0,0.5); position: relative; }
        .tabs { display: flex; background: #000; padding: 5px; border-radius: 15px; margin-bottom: 30px; border: 1px solid var(--border); }
        .tab { flex: 1; padding: 12px; border: none; background: transparent; color: var(--text-dim); font-family: 'Cairo'; font-weight: 700; cursor: pointer; border-radius: 12px; transition: 0.4s; }
        .tab.active { background: var(--primary); color: #000; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 14px; color: var(--primary); margin-bottom: 10px; font-weight: 600; text-align: right; }
        input { width: 100%; padding: 15px; background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 12px; color: #fff; font-family: 'Cairo'; font-size: 16px; text-align: center; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--accent); background: rgba(255,255,255,0.05); }
        .btn-main { width: 100%; padding: 16px; background: linear-gradient(90deg, #B8860B, #D4AF37); color: #000; border: none; border-radius: 15px; font-weight: 800; font-size: 16px; cursor: pointer; transition: 0.4s; margin-top: 10px; }
        .btn-main:disabled { opacity: 0.5; cursor: not-allowed; }
        #smsVerifyArea { display: none; text-align: center; }
        .status-box { padding: 12px; border-radius: 10px; font-size: 13px; text-align: center; margin-top: 20px; display: none; }
        .status-error { background: rgba(255, 71, 87, 0.1); color: #ff4757; border: 1px solid rgba(255, 71, 87, 0.2); }
        #recaptcha-container { margin: 15px 0; display: flex; justify-content: center; }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="brand"><h1>WIN100</h1></div>
        <div class="auth-card">
            
            <div id="authSteps">
                <div class="tabs">
                    <button class="tab active" id="loginTab">دخول</button>
                    <button class="tab" id="regTab">إنشاء حساب</button>
                </div>

                <div id="nameField" style="display: none;" class="input-group">
                    <label>الاسم الكامل</label>
                    <input type="text" id="userName" placeholder="أدخل اسمك الحقيقي">
                </div>
                <div class="input-group">
                    <label>رقم الهاتف</label>
                    <input type="tel" id="phone" value="+20" placeholder="+2010XXXXXXXX">
                </div>
                
                <div id="recaptcha-container"></div>
                
                <button class="btn-main" id="sendBtn">إرسال كود التفعيل</button>
            </div>

            <div id="smsVerifyArea">
                <h3 style="color: var(--primary); margin-top: 0;">تأكيد الرقم</h3>
                <p style="font-size: 14px; color: #ccc;">أدخل الـ 6 أرقام التي وصلتك في رسالة</p>
                <div class="input-group">
                    <input type="number" id="smsCode" placeholder="000000">
                </div>
                <button id="verifyBtn" class="btn-main">دخول المنصة 🔥</button>
                <p onclick="location.reload()" style="font-size: 12px; color: var(--text-dim); cursor: pointer; margin-top: 20px;">تغيير الرقم</p>
            </div>

            <div id="statusBox" class="status-box"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, RecaptchaVerifier, signInWithPhoneNumber } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // الـ Config الخاص بك (تم تحديثه بناءً على ملفك)
        const firebaseConfig = {
            apiKey: "AIzaSyAzcP_T8x5ouwwKkhadtBTdsUxk3XqwJec",
            authDomain: "vexa-4b2fb.firebaseapp.com",
            projectId: "vexa-4b2fb",
            storageBucket: "vexa-4b2fb.firebasestorage.app",
            messagingSenderId: "977620445308",
            appId: "1:977620445308:web:71e66418d95c43dc8881f9"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let isLoginMode = true;

        // تبديل التابس
        document.getElementById('loginTab').onclick = () => {
            isLoginMode = true;
            document.getElementById('loginTab').classList.add('active');
            document.getElementById('regTab').classList.remove('active');
            document.getElementById('nameField').style.display = 'none';
        };
        document.getElementById('regTab').onclick = () => {
            isLoginMode = false;
            document.getElementById('regTab').classList.add('active');
            document.getElementById('loginTab').classList.remove('active');
            document.getElementById('nameField').style.display = 'block';
        };

        // تهيئة ReCAPTCHA
        const setupRecaptcha = () => {
            if (!window.recaptchaVerifier) {
                window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
                    'size': 'invisible'
                });
            }
        };

        // إرسال الـ SMS
        document.getElementById('sendBtn').onclick = async () => {
            const phone = document.getElementById('phone').value.trim();
            const name = document.getElementById('userName').value.trim();
            const statusBox = document.getElementById('statusBox');
            const sendBtn = document.getElementById('sendBtn');

            if (!isLoginMode && !name) {
                alert("اكتب اسمك عشان نعرفك يا بطل");
                return;
            }

            statusBox.style.display = 'none';
            sendBtn.disabled = true;
            setupRecaptcha();

            try {
                const confirmationResult = await signInWithPhoneNumber(auth, phone, window.recaptchaVerifier);
                window.confirmationResult = confirmationResult;
                window.userData = { name, phone };

                document.getElementById('authSteps').style.display = 'none';
                document.getElementById('smsVerifyArea').style.display = 'block';
            } catch (error) {
                sendBtn.disabled = false;
                statusBox.innerText = "خطأ: تأكد من الرقم (+20) ومن تشغيل الـ Live Server.";
                statusBox.className = "status-box status-error";
                statusBox.style.display = 'block';
                console.error(error);
            }
        };

        // تأكيد الكود
        document.getElementById('verifyBtn').onclick = async () => {
            const code = document.getElementById('smsCode').value;
            const verifyBtn = document.getElementById('verifyBtn');

            verifyBtn.disabled = true;

            try {
                const result = await window.confirmationResult.confirm(code);
                const user = result.user;

                // حفظ البيانات في Firestore لو حساب جديد
                if (!isLoginMode) {
                    await setDoc(doc(db, "users", user.uid), {
                        uid: user.uid,
                        name: window.userData.name,
                        phone: user.phoneNumber,
                        verified: true,
                        balance: 0,
                        createdAt: new Date()
                    });
                }

                window.location.href = "home.html";
            } catch (error) {
                verifyBtn.disabled = false;
                alert("الكود غلط أو انتهت صلاحيته!");
            }
        };
    </script>
</body>
</html>
