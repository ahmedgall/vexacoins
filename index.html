<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vexa | بوابة الدخول</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #0ea5e9; --bg-dark: #020617; --card-bg: rgba(30, 41, 59, 0.7); --text-main: #f8fafc; --text-dim: #94a3b8; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--bg-dark); background-image: radial-gradient(at 0% 0%, rgba(14, 165, 233, 0.15) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(99, 102, 241, 0.15) 0px, transparent 50%); color: var(--text-main); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        
        .auth-container { width: 100%; max-width: 420px; padding: 20px; animation: slideUp 0.6s ease-out; }
        .glass-panel { background: var(--card-bg); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 28px; padding: 40px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); position: relative; }
        
        .header { text-align: center; margin-bottom: 25px; }
        .header i { font-size: 50px; color: var(--primary); margin-bottom: 10px; }
        .welcome-msg { font-size: 12px; color: var(--primary); background: rgba(14, 165, 233, 0.1); padding: 10px; border-radius: 12px; margin-bottom: 20px; text-align: center; display: none; border: 1px solid rgba(14, 165, 233, 0.2); }

        .input-group { position: relative; margin-bottom: 18px; }
        .input-group i { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); color: var(--text-dim); }
        .input-group input { width: 100%; padding: 14px 48px 14px 16px; background: rgba(15, 23, 42, 0.6); border: 1.5px solid transparent; border-radius: 14px; color: white; font-size: 15px; outline: none; transition: 0.3s; box-sizing: border-box; }
        .input-group input:focus { border-color: var(--primary); background: #0f172a; }

        .remember-box { display: flex; align-items: center; justify-content: space-between; margin: 15px 5px; font-size: 13px; color: var(--text-dim); }
        .remember-box input { accent-color: var(--primary); cursor: pointer; width: 18px; height: 18px; }

        .main-btn { width: 100%; padding: 15px; border-radius: 14px; border: none; background: linear-gradient(135deg, var(--primary), #6366f1); color: white; font-size: 17px; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .cancel-btn { background: transparent; color: var(--text-dim); border: 1px solid rgba(255,255,255,0.1); font-size: 13px; margin-top: 10px; width: 100%; padding: 10px; border-radius: 10px; cursor: pointer; }

        .footer-text { text-align: center; margin-top: 25px; font-size: 14px; color: var(--text-dim); }
        .toggle-btn { color: var(--primary); text-decoration: none; font-weight: 700; cursor: pointer; }
        .hidden { display: none; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="glass-panel">
        <div class="header">
            <i class="fas fa-user-shield"></i>
            <h1 id="title" style="font-weight: 900;">Vexa Login</h1>
        </div>

        <div id="smart-welcome" class="welcome-msg">
            <i class="fas fa-hand-holding-heart"></i>
            نحرص على تسجيل دخولك يدوياً في كل مرة لضمان أمان حسابك وعدم نسيان كلمة المرور.
        </div>

        <div id="name-field" class="hidden">
            <div class="input-group">
                <input type="text" id="username" placeholder="الاسم بالكامل">
                <i class="fas fa-user"></i>
            </div>
        </div>

        <div class="input-group">
            <input type="tel" id="phone" placeholder="رقم الموبايل">
            <i class="fas fa-phone"></i>
        </div>

        <div class="input-group">
            <input type="password" id="password" placeholder="كلمة المرور">
            <i class="fas fa-lock"></i>
        </div>

        <div id="confirm-pass-field" class="hidden">
            <div class="input-group">
                <input type="password" id="confirm-password" placeholder="تأكيد كلمة المرور">
                <i class="fas fa-check-double"></i>
            </div>
        </div>

        <div class="remember-box" id="remember-container">
            <label style="cursor:pointer">
                <input type="checkbox" id="remember-me"> تذكرني دائماً (دخول تلقائي)
            </label>
        </div>

        <button class="main-btn" id="submit-btn">دخول</button>
        <button id="clear-data-btn" class="cancel-btn hidden">تسجيل دخول من رقم آخر</button>

        <p class="footer-text">
            <span id="toggle-msg">ليس لديك حساب؟</span>
            <span class="toggle-btn" id="toggle-link">إنشاء حساب جديد</span>
        </p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAzcP_T8x5ouwwKkhadtBTdsUxk3XqwJec",
        authDomain: "vexa-4b2fb.firebaseapp.com",
        projectId: "vexa-4b2fb",
        appId: "1:977620445308:web:fec22230e1fbb30c8881f9"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let isRegisterMode = false;

    // ✅ التحقق من بيانات المستخدم المحفوظة عند فتح الصفحة
    window.onload = () => {
        const savedPhone = localStorage.getItem('vexa_phone');
        const savedPass = localStorage.getItem('vexa_pass');
        const autoLogin = localStorage.getItem('vexa_auto');

        if (savedPhone) {
            document.getElementById('phone').value = savedPhone;
            document.getElementById('smart-welcome').style.display = 'block';
            document.getElementById('clear-data-btn').classList.remove('hidden');
            
            // إذا كان مفعل "تذكرني" يدخل تلقائياً
            if (autoLogin === 'true' && savedPass) {
                document.getElementById('password').value = savedPass;
                loginUser(savedPhone, savedPass, true);
            }
        }
    };

    // تبديل بين تسجيل ودخول
    document.getElementById('toggle-link').onclick = () => {
        isRegisterMode = !isRegisterMode;
        document.getElementById('title').innerText = isRegisterMode ? "إنشاء حساب" : "تسجيل الدخول";
        document.getElementById('name-field').classList.toggle('hidden');
        document.getElementById('confirm-pass-field').classList.toggle('hidden');
        document.getElementById('remember-container').classList.toggle('hidden');
        document.getElementById('submit-btn').innerText = isRegisterMode ? "تأكيد التسجيل" : "دخول";
    };

    // زر مسح البيانات
    document.getElementById('clear-data-btn').onclick = () => {
        localStorage.clear();
        location.reload();
    };

    document.getElementById('submit-btn').onclick = () => {
        const phone = document.getElementById('phone').value.trim();
        const password = document.getElementById('password').value;
        const isRemember = document.getElementById('remember-me').checked;
        
        if (isRegisterMode) {
            handleRegister();
        } else {
            loginUser(phone, password, isRemember);
        }
    };

    async function loginUser(phone, password, remember) {
        if (!phone || !password) return Swal.fire('تنبيه', 'أدخل البيانات كاملة', 'warning');
        const fakeEmail = `${phone}@fixaa.com`;

        Swal.fire({ title: 'جاري تسجيل الدخول...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

        try {
            await signInWithEmailAndPassword(auth, fakeEmail, password);
            
            // ✅ حفظ البيانات إذا اختار "تذكرني"
            localStorage.setItem('vexa_phone', phone);
            if (remember) {
                localStorage.setItem('vexa_pass', password);
                localStorage.setItem('vexa_auto', 'true');
            } else {
                localStorage.removeItem('vexa_pass');
                localStorage.setItem('vexa_auto', 'false');
            }

            window.location.href = "home.html";
        } catch (error) {
            Swal.fire('فشل', 'رقم الهاتف أو كلمة المرور غير صحيحة', 'error');
        }
    }

    async function handleRegister() {
        const phone = document.getElementById('phone').value.trim();
        const password = document.getElementById('password').value;
        const confirmPass = document.getElementById('confirm-password').value;
        const fullName = document.getElementById('username').value;
        const fakeEmail = `${phone}@fixaa.com`;

        if (password !== confirmPass) return Swal.fire('خطأ', 'الباسورد غير متطابق', 'error');

        try {
            const res = await createUserWithEmailAndPassword(auth, fakeEmail, password);
            await setDoc(doc(db, "users", res.user.uid), {
                username: fullName,
                phone: phone,
                walletBalance: 0,
                userId: res.user.uid,
                createdAt: new Date()
            });
            localStorage.setItem('vexa_phone', phone); // حفظ الرقم بعد التسجيل مباشرة
            Swal.fire('نجاح', 'تم إنشاء حسابك بنجاح', 'success').then(() => {
                window.location.href = "home.html";
            });
        } catch (e) {
            Swal.fire('فشل', 'هذا الرقم مسجل بالفعل', 'error');
        }
    }
</script>
</body>
</html>
