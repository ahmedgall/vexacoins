<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vexa | إيداع أموال</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #0ea5e9; --bg: #020617; --card: rgba(30, 41, 59, 0.6); --text-dim: #94a3b8; --success: #10b981; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; }
        
        .deposit-card {
            background: var(--card); backdrop-filter: blur(15px); border-radius: 28px;
            padding: 25px; border: 1px solid rgba(255,255,255,0.1);
            max-width: 450px; margin: 20px auto;
        }

        .payment-method {
            background: rgba(14, 165, 233, 0.1); border: 1px dashed var(--primary);
            border-radius: 20px; padding: 20px; text-align: center; margin-bottom: 25px;
        }

        .copy-box {
            background: #0f172a; padding: 12px; border-radius: 12px;
            display: flex; justify-content: space-between; align-items: center; margin-top: 10px;
        }

        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 13px; color: var(--text-dim); margin-bottom: 8px; }
        
        input {
            width: 100%; padding: 15px; background: #0f172a; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px; color: white; font-family: 'Cairo'; outline: none; box-sizing: border-box;
        }

        .notice {
            font-size: 11px; color: var(--text-dim); background: rgba(255,255,255,0.03);
            padding: 10px; border-radius: 10px; border-right: 3px solid var(--primary); margin-bottom: 20px;
        }

        .btn-deposit {
            width: 100%; padding: 16px; border-radius: 15px; border: none;
            background: linear-gradient(135deg, var(--primary), #6366f1);
            color: white; font-weight: 800; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="deposit-card">
        <h2 style="text-align: center; margin-bottom: 5px;">إيداع رصيد</h2>
        <p style="text-align: center; color: var(--text-dim); font-size: 12px; margin-bottom: 25px;">قم بتحويل المبلغ وسنقوم بإضافته لحسابك</p>

        <div class="payment-method">
            <span style="font-size: 13px; color: var(--text-dim);">حول المبلغ إلى رقم فودافون كاش:</span>
            <div class="copy-box">
                <b id="wallet-num">01064170259</b>
                <i class="fas fa-copy" style="color: var(--primary); cursor: pointer;" onclick="copyNum()"></i>
            </div>
        </div>

        <div class="notice">
            <i class="fas fa-info-circle"></i>
            بعد التحويل، قم برفع بيانات العملية هنا ليقوم النظام بالتأكد وإضافة الرصيد لمحفظتك خلال 5-15 دقيقة.
        </div>

        <div class="input-group">
            <label>المبلغ الذي قمت بتحويله (ج.م)</label>
            <input type="number" id="dep-amount" placeholder="0.00">
        </div>

        <div class="input-group">
            <label>الرقم الذي قمت بالتحويل منه</label>
            <input type="text" id="sender-num" placeholder="01xxxxxxxxx">
        </div>

        <button class="btn-deposit" id="submit-deposit">تأكيد الإيداع</button>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";
    import { getAuth } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAzcP_T8x5ouwwKkhadtBTdsUxk3XqwJec",
        authDomain: "vexa-4b2fb.firebaseapp.com",
        projectId: "vexa-4b2fb",
        appId: "1:977620445308:web:fec22230e1fbb30c8881f9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    window.copyNum = () => {
        const num = document.getElementById('wallet-num').innerText;
        navigator.clipboard.writeText(num);
        Swal.fire({ title: 'تم النسخ!', toast: true, position: 'top', showConfirmButton: false, timer: 2000, icon: 'success' });
    }

    document.getElementById('submit-deposit').onclick = async () => {
        const amount = parseFloat(document.getElementById('dep-amount').value);
        const sender = document.getElementById('sender-num').value.trim();
        const user = auth.currentUser;

        if (!amount || amount <= 0 || !sender) {
            return Swal.fire('تنبيه', 'يرجى إدخال المبلغ ورقم المحول', 'warning');
        }

        Swal.fire({ title: 'جاري إرسال الطلب...', didOpen: () => Swal.showLoading() });

        try {
            // إضافة طلب إيداع في قاعدة البيانات
            await addDoc(collection(db, "transactions"), {
                uid: user.uid,
                type: 'deposit',
                amount: amount,
                sender_phone: sender,
                status: 'pending', // حالة الانتظار حتى يوافق المدير
                asset: 'EGP',
                timestamp: serverTimestamp()
            });

            await Swal.fire({
                title: 'تم استلام طلبك',
                text: 'جاري مراجعة التحويل وإضافة الرصيد لمحفظتك قريباً.',
                icon: 'success'
            });
            
            window.location.href = 'wallet.html';

        } catch (e) {
            Swal.fire('خطأ', 'حدثت مشكلة أثناء إرسال الطلب', 'error');
        }
    };
</script>
</body>
</html>
