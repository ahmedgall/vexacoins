<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vexa Crypto | إرسال عملات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #0ea5e9; --bg: #020617; --card: rgba(30, 41, 59, 0.7); --text-dim: #94a3b8; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; }
        
        .transfer-card {
            background: var(--card); backdrop-filter: blur(15px);
            border-radius: 28px; padding: 25px; border: 1px solid rgba(255,255,255,0.1);
            max-width: 450px; margin: 20px auto;
        }

        .asset-select {
            width: 100%; padding: 15px; background: #0f172a; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px; color: white; font-family: 'Cairo'; margin-bottom: 20px; outline: none;
        }

        .balance-info {
            background: rgba(14, 165, 233, 0.1); padding: 12px; border-radius: 12px;
            margin-bottom: 20px; display: flex; justify-content: space-between; font-size: 13px;
        }

        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 5px; }
        
        input {
            width: 100%; padding: 15px; background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 15px;
            color: white; font-family: 'Cairo'; outline: none; box-sizing: border-box;
        }

        .btn-send {
            width: 100%; padding: 16px; border-radius: 15px; border: none;
            background: linear-gradient(135deg, var(--primary), #6366f1);
            color: white; font-weight: 800; cursor: pointer; margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="transfer-card">
        <h2 style="text-align: center;">إرسال عملات مشفرة</h2>

        <div class="input-group">
            <label>اختر العملة من محفظتك</label>
            <select id="asset-selector" class="asset-select">
                <option value="">جاري تحميل محفظتك...</option>
            </select>
        </div>

        <div class="balance-info">
            <span>رصيدك من هذه العملة:</span>
            <b id="available-amount">0.00</b>
        </div>

        <div class="input-group">
            <label>معرف المستلم (VX ID)</label>
            <input type="text" id="receiver-id" placeholder="VX-XXXXXX">
        </div>

        <div class="input-group">
            <label>الكمية المراد إرسالها</label>
            <input type="number" id="send-amount" placeholder="0.00">
        </div>

        <button class="btn-send" id="execute-transfer">تأكيد التحويل المشفر</button>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, getDoc, getDocs, collection, runTransaction, serverTimestamp, addDoc } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";
    import { getAuth } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAzcP_T8x5ouwwKkhadtBTdsUxk3XqwJec",
        authDomain: "vexa-4b2fb.firebaseapp.com",
        projectId: "vexa-4b2fb",
        appId: "1:977620445308:web:fec22230e1fbb30c8881f9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let myAssets = {};

    auth.onAuthStateChanged(user => {
        if (user) {
            // جلب العملات التي يمتلكها المستخدم فقط
            onSnapshot(collection(db, "users", user.uid, "myAssets"), (snap) => {
                const selector = document.getElementById('asset-selector');
                selector.innerHTML = '<option value="">اختر العملة</option>';
                myAssets = {};
                snap.forEach(doc => {
                    const data = doc.data();
                    myAssets[doc.id] = data;
                    selector.innerHTML += `<option value="${doc.id}">${data.symbol} (${data.name || doc.id})</option>`;
                });
            });
        }
    });

    document.getElementById('asset-selector').onchange = (e) => {
        const asset = myAssets[e.target.value];
        document.getElementById('available-amount').innerText = asset ? `${asset.amount} ${asset.symbol}` : "0.00";
    };

    document.getElementById('execute-transfer').onclick = async () => {
        const assetId = document.getElementById('asset-selector').value;
        const vxid = document.getElementById('receiver-id').value.trim();
        const amount = parseFloat(document.getElementById('send-amount').value);

        if (!assetId || !vxid || !amount || amount <= 0) return Swal.fire('تنبيه', 'أكمل البيانات', 'warning');
        if (amount > myAssets[assetId].amount) return Swal.fire('خطأ', 'رصيدك غير كافٍ', 'error');

        Swal.fire({ title: 'جاري التحقق...', didOpen: () => Swal.showLoading() });

        // البحث عن المستلم عبر الـ ID
        const cleanID = vxid.replace("VX-", "").toLowerCase();
        const usersSnap = await getDocs(collection(db, "users"));
        let receiverUID = null;
        let receiverName = "";

        usersSnap.forEach(uDoc => {
            if (uDoc.id.substring(0, 6).toLowerCase() === cleanID) {
                receiverUID = uDoc.id;
                receiverName = uDoc.data().username;
            }
        });

        if (!receiverUID) return Swal.fire('خطأ', 'المستلم غير موجود', 'error');
        if (receiverUID === auth.currentUser.uid) return Swal.fire('تنبيه', 'لا يمكنك الإرسال لنفسك', 'info');

        const confirm = await Swal.fire({
            title: 'تأكيد الإرسال',
            text: `هل ترغب في إرسال ${amount} ${myAssets[assetId].symbol} إلى ${receiverName}؟`,
            icon: 'warning', showCancelButton: true
        });

        if (confirm.isConfirmed) {
            try {
                await runTransaction(db, async (ts) => {
                    const myAssetRef = doc(db, "users", auth.currentUser.uid, "myAssets", assetId);
                    const hisAssetRef = doc(db, "users", receiverUID, "myAssets", assetId);

                    const myAssetSnap = await ts.get(myAssetRef);
                    const hisAssetSnap = await ts.get(hisAssetRef);

                    // خصم من الراسل
                    ts.update(myAssetRef, { amount: myAssetSnap.data().amount - amount });

                    // إضافة للمستلم (أو إنشاء الأصل له لو مش عنده)
                    if (hisAssetSnap.exists()) {
                        ts.update(hisAssetRef, { amount: hisAssetSnap.data().amount + amount });
                    } else {
                        ts.set(hisAssetRef, { 
                            amount: amount, 
                            symbol: myAssets[assetId].symbol, 
                            name: myAssets[assetId].name || assetId 
                        });
                    }

                    // سجل التحويلات
                    addDoc(collection(db, "transactions"), {
                        from: auth.currentUser.uid,
                        to: receiverUID,
                        asset: myAssets[assetId].symbol,
                        amount: amount,
                        type: 'crypto_transfer',
                        timestamp: serverTimestamp()
                    });
                });

                Swal.fire('تم الإرسال', 'وصلت العملات للمستلم بنجاح', 'success');
                document.getElementById('send-amount').value = '';
            } catch (e) { Swal.fire('فشل', e.toString(), 'error'); }
        }
    };
</script>
</body>
</html>
