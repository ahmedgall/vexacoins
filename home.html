<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vexa Market | منصة التداول</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #0ea5e9;
            --primary-glow: rgba(14, 165, 233, 0.3);
            --bg-dark: #020617;
            --card-bg: rgba(30, 41, 59, 0.5);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #6366f1;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: radial-gradient(circle at top right, #0f172a, #020617);
            background-attachment: fixed;
            color: var(--text-main);
            margin: 0;
            padding-bottom: 100px;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .header { 
            padding: 40px 25px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .header h1 { 
            font-size: 24px; 
            font-weight: 800; 
            margin: 0;
            background: linear-gradient(135deg, #fff 30%, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }
        .notif-btn {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            width: 45px; height: 45px;
            border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(10px);
        }

        .container { padding: 0 20px; }

        /* --- زرار اللعبة المطور (Lucky Boxes) --- */
        .game-entry-card {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1) 0%, rgba(14, 165, 233, 0.1) 100%);
            border: 1px solid rgba(14, 165, 233, 0.3);
            border-radius: 24px;
            padding: 16px 20px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-decoration: none;
            position: relative;
            overflow: hidden;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .game-entry-card::after {
            content: '';
            position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(14, 165, 233, 0.1) 0%, transparent 70%);
            animation: pulseBg 3s infinite;
        }
        .game-entry-card:hover {
            transform: translateY(-3px);
            border-color: var(--primary);
            box-shadow: 0 15px 30px rgba(14, 165, 233, 0.2);
        }
        .game-content { display: flex; align-items: center; gap: 15px; z-index: 1; }
        .game-icon {
            width: 45px; height: 45px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 22px;
            box-shadow: 0 5px 15px var(--primary-glow);
        }
        .game-badge {
            background: var(--danger);
            color: white; font-size: 10px; font-weight: 900;
            padding: 2px 8px; border-radius: 10px;
            position: absolute; top: 12px; right: 20px;
            text-transform: uppercase;
        }

        .coin-list-header { 
            display: flex; justify-content: space-between; 
            padding: 10px 10px; color: var(--text-dim); 
            font-size: 12px; font-weight: 600;
        }

        /* كارت العملة */
        .coin-card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            padding: 18px 22px;
            margin-bottom: 14px;
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid var(--glass-border);
            transition: all 0.3s;
            animation: slideUp 0.5s ease backwards;
        }
        .coin-card:hover { 
            border-color: var(--primary);
            background: rgba(30, 41, 59, 0.8);
            transform: scale(1.01);
        }
        .coin-info { display: flex; align-items: center; gap: 15px; }
        .coin-logo { 
            width: 48px; height: 48px; 
            background: #0f172a; border-radius: 16px; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: 800; color: var(--primary); 
            border: 1px solid rgba(14,165,233,0.2);
        }
        .price { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 17px; display: block; text-align: left;}
        .change { font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: 8px; }
        .up { background: rgba(16, 185, 129, 0.1); color: var(--success); }
        .down { background: rgba(239, 68, 68, 0.1); color: var(--danger); }

        /* Bottom Nav */
        .bottom-nav { 
            position: fixed; bottom: 20px; left: 20px; right: 20px;
            height: 70px; background: rgba(15, 23, 42, 0.9); 
            backdrop-filter: blur(20px); 
            display: flex; justify-content: space-around; align-items: center; 
            border: 1px solid var(--glass-border); border-radius: 25px;
            z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .nav-item { color: var(--text-dim); text-decoration: none; text-align: center; font-size: 11px; }
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 4px; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulseBg { 0% { opacity: 0.3; } 50% { opacity: 0.6; } 100% { opacity: 0.3; } }
        
        .loader { width: 30px; height: 30px; border: 3px solid var(--card-bg); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s infinite linear; margin: 50px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="header">
        <h1>VEXA MARKET</h1>
        <div class="notif-btn"><i class="fas fa-bell" style="color: var(--text-dim);"></i></div>
    </div>

    <div class="container">
        
        <a href="game.html" class="game-entry-card">
            <span class="game-badge">جديد</span>
            <div class="game-content">
                <div class="game-icon">
                    <i class="fas fa-box-open"></i>
                </div>
                <div>
                    <h3 style="margin:0; font-size: 16px; font-weight: 800;">صناديق الحظ 🔥</h3>
                    <p style="margin:0; font-size: 11px; color: var(--text-dim);">استخدم رصيدك وضاعف أرباحك فوراً</p>
                </div>
            </div>
            <i class="fas fa-chevron-left" style="color: var(--primary); font-size: 14px; z-index: 1;"></i>
        </a>

        <div class="coin-list-header">
            <span>العملة / الرمز</span>
            <span>السعر المباشر (EGP)</span>
        </div>

        <div id="market-list">
            <div class="loader"></div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="home.html" class="nav-item active"><i class="fas fa-chart-pie"></i><span>السوق</span></a>
        <a href="wallet.html" class="nav-item"><i class="fas fa-wallet"></i><span>المحفظة</span></a>
        <a href="trade.html" class="nav-item"><i class="fas fa-bolt"></i><span>استثمار</span></a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user-gear"></i><span>الإعدادات</span></a>
    </nav>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAzcP_T8x5ouwwKkhadtBTdsUxk3XqwJec",
        authDomain: "vexa-4b2fb.firebaseapp.com",
        projectId: "vexa-4b2fb",
        appId: "1:977620445308:web:fec22230e1fbb30c8881f9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.goToDetails = (id) => { window.location.href = `coin-details.html?id=${id}`; };

    function loadVexaMarket() {
        onSnapshot(collection(db, "marketCoins"), (snapshot) => {
            const listContainer = document.getElementById('market-list');
            listContainer.innerHTML = '';
            
            let delay = 0;
            snapshot.forEach((doc) => {
                const coin = doc.data();
                const isUp = coin.change >= 0;
                const formattedPrice = new Intl.NumberFormat('en-US', { minimumFractionDigits: 2 }).format(coin.price);

                const card = `
                    <div class="coin-card" onclick="goToDetails('${doc.id}')" style="animation-delay: ${delay}s">
                        <div class="coin-info">
                            <div class="coin-logo">${coin.symbol.charAt(0)}</div>
                            <div class="coin-details">
                                <h3 style="margin:0; font-size:16px;">${coin.name}</h3>
                                <span style="font-size:12px; color:var(--text-dim);">${coin.symbol}</span>
                            </div>
                        </div>
                        <div style="text-align: left;">
                            <span class="price">${formattedPrice}</span>
                            <span class="change ${isUp ? 'up' : 'down'}">
                                <i class="fas fa-caret-${isUp ? 'up' : 'down'}"></i> ${Math.abs(coin.change)}%
                            </span>
                        </div>
                    </div>
                `;
                listContainer.insertAdjacentHTML('beforeend', card);
                delay += 0.05;
            });
        });
    }
    loadVexaMarket();
</script>
</body>
</html>
