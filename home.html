<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vexa Market | منصة التداول</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #0ea5e9;
            --primary-glow: rgba(14, 165, 233, 0.2);
            --bg-dark: #020617;
            --card-bg: rgba(30, 41, 59, 0.5);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: radial-gradient(circle at top right, #0f172a, #020617);
            background-attachment: fixed;
            color: var(--text-main);
            margin: 0;
            padding-bottom: 100px;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* تحسين الهيدر */
        .header { 
            padding: 40px 25px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .header h1 { 
            font-size: 24px; 
            font-weight: 800; 
            margin: 0;
            background: linear-gradient(135deg, #fff 30%, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }
        .notif-btn {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            width: 45px;
            height: 45px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            cursor: pointer;
        }

        .container { padding: 0 20px; }

        .coin-list-header { 
            display: flex; 
            justify-content: space-between; 
            padding: 15px 10px; 
            color: var(--text-dim); 
            font-size: 12px; 
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* كارت العملة المطور */
        .coin-card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            padding: 18px 22px;
            margin-bottom: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--glass-border);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            animation: slideUp 0.5s ease backwards;
        }

        .coin-card:hover { 
            border-color: var(--primary);
            background: rgba(30, 41, 59, 0.8);
            transform: translateY(-3px) scale(1.01);
        }

        .coin-card:active { transform: scale(0.97); }

        .coin-info { display: flex; align-items: center; gap: 15px; }
        .coin-logo { 
            width: 48px; height: 48px; 
            background: linear-gradient(135deg, #1e293b, #020617);
            border-radius: 16px; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: 800; color: var(--primary); 
            border: 1px solid rgba(14,165,233,0.3);
            font-size: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        .coin-details h3 { margin: 0; font-size: 16px; font-weight: 700; color: #fff; }
        .coin-details span { font-size: 12px; color: var(--text-dim); font-weight: 600; }

        .coin-market { text-align: left; }
        .price { 
            display: block; 
            font-family: 'Inter', sans-serif;
            font-weight: 700; 
            font-size: 17px; 
            margin-bottom: 4px; 
            color: #fff;
        }
        .change { 
            font-family: 'Inter', sans-serif;
            font-size: 12px; 
            font-weight: 700; 
            padding: 4px 10px; 
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .up { background: rgba(16, 185, 129, 0.15); color: var(--success); }
        .down { background: rgba(239, 68, 68, 0.15); color: var(--danger); }

        /* Bottom Nav المطور */
        .bottom-nav { 
            position: fixed; bottom: 20px; left: 20px; right: 20px;
            height: 70px; 
            background: rgba(15, 23, 42, 0.85); 
            backdrop-filter: blur(20px); 
            display: flex; justify-content: space-around; align-items: center; 
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            z-index: 1000; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .nav-item { color: var(--text-dim); text-decoration: none; display: flex; flex-direction: column; align-items: center; font-size: 11px; font-weight: 600; transition: 0.3s; }
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 22px; margin-bottom: 4px; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ستايل السبنر */
        .loader-container {
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 300px;
        }
        .loader {
            width: 40px; height: 40px; border: 4px solid var(--card-bg); border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="header">
        <h1>VEXA MARKET</h1>
        <div class="notif-btn">
            <i class="fas fa-bell" style="color: var(--text-dim);"></i>
        </div>
    </div>

    <div class="container">
        <div class="coin-list-header">
            <span>العملة / الرمز</span>
            <span>السعر المباشر</span>
        </div>

        <div id="market-list">
            <div class="loader-container">
                <div class="loader"></div>
                <p style="color: var(--text-dim); margin-top: 15px; font-size: 14px;">جاري تحديث البيانات...</p>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="home.html" class="nav-item active"><i class="fas fa-chart-pie"></i><span>السوق</span></a>
        <a href="wallet.html" class="nav-item"><i class="fas fa-wallet"></i><span>المحفظة</span></a>
        <a href="trade.html" class="nav-item"><i class="fas fa-bolt"></i><span>صندوق استثماري</span></a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user-gear"></i><span>الإعدادات</span></a>
    </nav>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAzcP_T8x5ouwwKkhadtBTdsUxk3XqwJec",
        authDomain: "vexa-4b2fb.firebaseapp.com",
        projectId: "vexa-4b2fb",
        storageBucket: "vexa-4b2fb.firebasestorage.app",
        messagingSenderId: "977620445308",
        appId: "1:977620445308:web:fec22230e1fbb30c8881f9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.goToDetails = (id) => {
        window.location.href = `coin-details.html?id=${id}`;
    };

    function loadVexaMarket() {
        const marketRef = collection(db, "marketCoins");
        
        onSnapshot(marketRef, (snapshot) => {
            const listContainer = document.getElementById('market-list');
            listContainer.innerHTML = '';
            
            let delay = 0;
            snapshot.forEach((doc) => {
                const coin = doc.data();
                const isUp = coin.change >= 0;
                
                // تنسيق الرقم انجليزي للقراءة السهلة
                const formattedPrice = new Intl.NumberFormat('en-US', {
                    minimumFractionDigits: 2,
                    maximumFractionDigits: 2
                }).format(coin.price);

                const card = `
                    <div class="coin-card" onclick="goToDetails('${doc.id}')" style="animation-delay: ${delay}s">
                        <div class="coin-info">
                            <div class="coin-logo">${coin.symbol.charAt(0)}</div>
                            <div class="coin-details">
                                <h3>${coin.name}</h3>
                                <span>${coin.symbol} <small style="opacity:0.5">/ EGP</small></span>
                            </div>
                        </div>
                        <div class="coin-market">
                            <span class="price">${formattedPrice} <small style="font-size:10px; color:var(--text-dim); font-weight:400">ج.م</small></span>
                            <span class="change ${isUp ? 'up' : 'down'}">
                                <i class="fas fa-caret-${isUp ? 'up' : 'down'}"></i> 
                                ${Math.abs(coin.change)}%
                            </span>
                        </div>
                    </div>
                `;
                listContainer.insertAdjacentHTML('beforeend', card);
                delay += 0.05; // لعمل انيميشن متتالي للكروت
            });
        });
    }

    loadVexaMarket();
</script>
</body>
</html>
