<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محفظة فيكسا | Vexa Wallet</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #0ea5e9;
            --primary-glow: rgba(14, 165, 233, 0.25);
            --bg-dark: #020617;
            --card-bg: rgba(30, 41, 59, 0.5);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: radial-gradient(circle at top right, #0f172a, #020617);
            background-attachment: fixed;
            color: var(--text-main);
            margin: 0;
            padding: 30px 20px 110px;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* كارت الرصيد الرئيسي الهيرو */
        .balance-hero {
            position: relative;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 40px 25px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            animation: fadeIn 0.8s ease;
        }

        .balance-hero small { 
            color: var(--text-dim); font-size: 13px; font-weight: 700; 
            text-transform: uppercase; letter-spacing: 1.5px;
        }
        
        .balance-hero h2 { 
            font-family: 'Inter', sans-serif;
            font-size: 38px; margin: 12px 0; font-weight: 800; color: #fff; 
        }

        /* شبكة الأزرار السريعة */
        .actions-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
            margin-bottom: 35px;
        }
        
        .action-link {
            display: flex; flex-direction: column; align-items: center; gap: 10px;
            text-decoration: none; color: var(--text-main); transition: 0.3s;
        }
        
        .action-icon {
            width: 58px; height: 58px; background: var(--card-bg);
            border: 1px solid var(--glass-border); border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; color: var(--primary); backdrop-filter: blur(10px);
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .action-link:hover .action-icon { 
            background: var(--primary); color: white; transform: translateY(-3px);
            box-shadow: 0 10px 20px var(--primary-glow);
        }

        .action-link span { font-size: 12px; font-weight: 700; color: var(--text-dim); }

        /* قائمة الأصول */
        .section-header { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 20px; padding: 0 10px;
        }
        .section-header h3 { font-size: 18px; font-weight: 800; margin: 0; }
        
        .asset-card {
            background: var(--card-bg); backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border); border-radius: 24px;
            padding: 18px; display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 14px; transition: 0.3s;
            animation: slideUp 0.5s ease backwards;
        }

        .asset-info { display: flex; align-items: center; gap: 15px; }
        .asset-img {
            width: 48px; height: 48px; background: linear-gradient(135deg, #1e293b, #020617);
            border-radius: 16px; display: flex; align-items: center; justify-content: center;
            font-weight: 800; color: var(--primary); border: 1px solid var(--glass-border);
            font-family: 'Inter', sans-serif;
        }
        
        .asset-meta b { display: block; font-size: 16px; font-weight: 700; color: #fff; }
        .asset-meta span { font-family: 'Inter', sans-serif; font-size: 12px; color: var(--text-dim); }

        .asset-values { text-align: left; }
        .asset-val-egp { font-family: 'Inter', sans-serif; display: block; font-weight: 700; font-size: 16px; color: #fff; }
        .asset-change { font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 700; color: var(--success); }

        /* Bottom Nav الموحد (نفس صفحة السوق) */
        .bottom-nav { 
            position: fixed; bottom: 20px; left: 20px; right: 20px;
            height: 70px; background: rgba(15, 23, 42, 0.85); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            display: flex; justify-content: space-around; align-items: center; 
            border: 1px solid var(--glass-border); border-radius: 25px;
            z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        .nav-item { 
            color: var(--text-dim); text-decoration: none; 
            display: flex; flex-direction: column; align-items: center; 
            font-size: 11px; font-weight: 600; transition: 0.3s; 
        }
        
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 22px; margin-bottom: 4px; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        #loader { position: fixed; inset: 0; background: var(--bg-dark); display: flex; align-items: center; justify-content: center; z-index: 2000; }
    </style>
</head>
<body>

    <div id="loader"><i class="fas fa-circle-notch fa-spin" style="font-size: 30px; color: var(--primary);"></i></div>

    <div class="balance-hero">
        <small>إجمالي المحفظة</small>
        <h2 id="total-egp">0.00 <span style="font-size: 14px; font-weight: 400;">ج.م</span></h2>
        <div style="font-size: 12px; color: var(--success); font-weight: 700;">
              </div>
    </div>

    <div class="actions-grid">
        <a href="deposit.html" class="action-link">
            <div class="action-icon"><i class="fas fa-wallet"></i></div>
            <span>إيداع</span>
        </a>
        <a href="withdraw.html" class="action-link">
            <div class="action-icon"><i class="fas fa-hand-holding-dollar"></i></div>
            <span>سحب</span>
        </a>
        <a href="send.html" class="action-link">
            <div class="action-icon"><i class="fas fa-paper-plane"></i></div>
            <span>إرسال</span>
        </a>
        <a href="history.html" class="action-link">
            <div class="action-icon"><i class="fas fa-clock-rotate-left"></i></div>
            <span>سجل</span>
        </a>
    </div>

    <div class="section-header">
        <h3>أصولي الرقمية</h3>
        <span id="asset-count" style="color: var(--primary); font-size: 12px; font-weight: 700;">0 عملات</span>
    </div>

    <div id="assets-list">
        </div>

    <nav class="bottom-nav">
        <a href="home.html" class="nav-item">
            <i class="fas fa-chart-pie"></i>
            <span>السوق</span>
        </a>
        <a href="wallet.html" class="nav-item active">
            <i class="fas fa-wallet"></i>
            <span>المحفظة</span>
        </a>
        <a href="trade.html" class="nav-item">
            <i class="fas fa-bolt"></i>
            <span>استثمار</span>
        </a>
        <a href="profile.html" class="nav-item">
            <i class="fas fa-user-gear"></i>
            <span>الإعدادات</span>
        </a>
    </nav>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAzcP_T8x5ouwwKkhadtBTdsUxk3XqwJec",
        authDomain: "vexa-4b2fb.firebaseapp.com",
        projectId: "vexa-4b2fb",
        appId: "1:977620445308:web:fec22230e1fbb30c8881f9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
        if(user) {
            startWalletListener(user.uid);
        } else {
            window.location.href = 'index.html';
        }
    });

    function startWalletListener(uid) {
        // 1. مراقبة الرصيد الرئيسي
        onSnapshot(doc(db, "users", uid), (snap) => {
            if(snap.exists()) {
                const balance = snap.data().walletBalance || 0;
                document.getElementById('total-egp').innerHTML = `${balance.toLocaleString('en-US', {minimumFractionDigits: 2})} <span style="font-size: 16px;">ج.م</span>`;
            }
        });

        // 2. مراقبة العملات الممتلكة
        onSnapshot(collection(db, "users", uid, "myAssets"), (snapshot) => {
            const list = document.getElementById('assets-list');
            document.getElementById('asset-count').innerText = `${snapshot.size} عملات`;
            
            if(snapshot.empty) {
                list.innerHTML = `<div style="text-align:center; padding:50px; opacity:0.3; font-size:14px;">لا توجد أصول ممتلكة حالياً</div>`;
                document.getElementById('loader').style.display = 'none';
                return;
            }

            list.innerHTML = '';
            let delay = 0;
            snapshot.forEach((assetDoc) => {
                const asset = assetDoc.data();
                
                // ربط السعر المباشر من الماركت لكل عملة في المحفظة
                onSnapshot(doc(db, "marketCoins", assetDoc.id), (mSnap) => {
                    const currentPrice = mSnap.exists() ? mSnap.data().price : 0;
                    const totalValue = asset.amount * currentPrice;
                    
                    const cardId = `asset-${assetDoc.id}`;
                    let card = document.getElementById(cardId);
                    
                    const cardHTML = `
                        <div class="asset-info">
                            <div class="asset-img">${asset.symbol[0]}</div>
                            <div class="asset-meta">
                                <b>${asset.name}</b>
                                <span>${asset.amount.toFixed(4)} ${asset.symbol}</span>
                            </div>
                        </div>
                        <div class="asset-values">
                            <span class="asset-val-egp">${totalValue.toLocaleString('en-US', {minimumFractionDigits: 2})} ج.م</span>
                            <span class="asset-change">+${(Math.random() * 3).toFixed(2)}%</span>
                        </div>
                    `;

                    if(card) {
                        card.innerHTML = cardHTML;
                    } else {
                        const newCard = document.createElement('div');
                        newCard.id = cardId;
                        newCard.className = 'asset-card';
                        newCard.style.animationDelay = `${delay}s`;
                        newCard.innerHTML = cardHTML;
                        list.appendChild(newCard);
                    }
                });
                delay += 0.05;
            });
            document.getElementById('loader').style.display = 'none';
        });
    }
</script>
</body>
</html>
