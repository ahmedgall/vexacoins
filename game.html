<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vexa Bet | الرئيسية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #0ea5e9;
            --bg: #020617;
            --card-glass: rgba(30, 41, 59, 0.4);
            --text-dim: #94a3b8;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: radial-gradient(circle at top, #0f172a, #020617);
            color: white; margin: 0; padding: 0;
            overflow-x: hidden; padding-bottom: 90px;
        }

        /* هيدر نحيف واحترافي */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 20px; background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .logo { font-weight: 900; font-size: 20px; color: var(--primary); letter-spacing: 1px; }
        .logo span { color: white; }

        .balance-chip {
            background: rgba(14, 165, 233, 0.1); border: 1px solid var(--primary);
            padding: 4px 12px; border-radius: 50px; display: flex; align-items: center; gap: 8px;
        }
        .balance-chip span { font-weight: 800; font-size: 14px; }

        /* بانر مضغوط */
        .promo {
            margin: 15px; padding: 20px; border-radius: 20px;
            background: linear-gradient(135deg, #075985, #020617);
            position: relative; overflow: hidden; border: 1px solid rgba(255,255,255,0.1);
        }
        .promo h2 { margin: 0; font-size: 20px; font-weight: 900; }
        .promo p { margin: 5px 0 0; font-size: 12px; color: #bae6fd; }

        /* شبكة الألعاب */
        .section-label { padding: 0 20px; font-size: 16px; font-weight: 800; color: var(--primary); margin-top: 10px; }
        
        .grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 15px;
        }

        .card {
            background: var(--card-glass); border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05); overflow: hidden;
            transition: 0.3s; position: relative;
        }
        .card:active { transform: scale(0.95); }

        .card-icon {
            height: 90px; display: flex; align-items: center; justify-content: center;
            font-size: 35px; background: rgba(255,255,255,0.02);
        }

        .card-body { padding: 12px; text-align: center; }
        .card-body b { display: block; font-size: 14px; margin-bottom: 2px; }
        .card-body small { font-size: 10px; color: var(--text-dim); }

        .play-tag {
            background: var(--primary); color: white; font-size: 10px;
            font-weight: 900; padding: 2px 8px; border-radius: 4px;
            position: absolute; top: 10px; left: 10px;
        }

        /* ناف بار سفلي حقيقي */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; height: 70px;
            background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(15px);
            display: flex; justify-content: space-around; align-items: center;
            border-top: 1px solid rgba(255,255,255,0.05); z-index: 1000;
        }

        .nav-link { color: var(--text-dim); text-decoration: none; text-align: center; font-size: 10px; }
        .nav-link.active { color: var(--primary); }
        .nav-link i { display: block; font-size: 20px; margin-bottom: 4px; }

        /* ألوان الأيقونات */
        .c-crash { color: #f43f5e; }
        .c-mines { color: #10b981; }
        .c-dice { color: #f59e0b; }
        .c-wheel { color: #8b5cf6; }

    </style>
</head>
<body>

    <header class="header">
        <div class="logo">VEXA<span>BET</span></div>
        <div class="balance-chip">
            <i class="fas fa-wallet" style="color:var(--primary)"></i>
            <span id="bal">0.00</span>
            <small>ج.م</small>
        </div>
    </header>

    <div class="promo">
        <h2>بونص الإيداع 200%</h2>
        <p>اشحن رصيدك الآن وضاعف أرباحك فوراً</p>
    </div>

    <div class="section-label">ألعاب فيكسا الحصرية</div>

    <div class="grid">
        <div class="card" onclick="location.href='CRASH.html'">
            <div class="play-tag">HOT</div>
            <div class="card-icon c-crash"><i class="fas fa-rocket"></i></div>
            <div class="card-body">
                <b>Vexa Crash</b>
                <small>ضاعف أموالك</small>
            </div>
        </div>

        <div class="card" onclick="location.href='mines.html'">
            <div class="card-icon c-mines"><i class="fas fa-bomb"></i></div>
            <div class="card-body">
                <b>Mines</b>
                <small>ابحث عن الجواهر</small>
            </div>
        </div>

        <div class="card" onclick="location.href='dice.html'">
            <div class="card-icon c-dice"><i class="fas fa-dice"></i></div>
            <div class="card-body">
                <b>Dice</b>
                <small>توقع الربح</small>
            </div>
        </div>

        <div class="card" onclick="location.href='spin.html'">
            <div class="card-icon c-wheel"><i class="fas fa-dharmachakra"></i></div>
            <div class="card-body">
                <b>Wheel</b>
                <small>عجلة الحظ</small>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-link active"><i class="fas fa-home"></i>الرئيسية</a>
        <a href="wallet.html" class="nav-link"><i class="fas fa-wallet"></i>المحفظة</a>
        <a href="profile.html" class="nav-link"><i class="fas fa-user"></i>حسابي</a>
    </nav>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAzcP_T8x5ouwwKkhadtBTdsUxk3XqwJec",
        authDomain: "vexa-4b2fb.firebaseapp.com",
        projectId: "vexa-4b2fb",
        appId: "1:977620445308:web:fec22230e1fbb30c8881f9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            onSnapshot(doc(db, "users", user.uid), (doc) => {
                if (doc.exists()) {
                    const balance = doc.data().walletBalance || 0;
                    document.getElementById('bal').innerText = balance.toLocaleString('en-US', {minimumFractionDigits: 2});
                }
            });
        } else {
            location.href = 'login.html'; // تحويل للوجين لو مش مسجل
        }
    });
</script>
</body>
</html>
