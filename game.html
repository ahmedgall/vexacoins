<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vexa Luck | صناديق الحظ</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #0ea5e9; --bg: #020617; --card: rgba(30, 41, 59, 0.7); --success: #10b981; --danger: #ef4444; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: white; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        
        .balance-card { background: var(--card); border-radius: 25px; padding: 20px; text-align: center; margin: 20px auto; width: 90%; max-width: 400px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .balance-val { font-size: 28px; font-weight: 900; color: var(--primary); }

        /* منطقة الرهان */
        .bet-area { margin: 20px 0; text-align: center; width: 100%; max-width: 400px; }
        .bet-input-container { position: relative; display: inline-block; width: 80%; }
        .bet-input-container input { width: 100%; padding: 15px; border-radius: 15px; border: 2px solid #334155; background: #0f172a; color: white; font-size: 20px; font-weight: 900; text-align: center; outline: none; transition: 0.3s; }
        .bet-input-container input:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(14, 165, 233, 0.2); }
        .win-estimate { color: var(--success); font-size: 14px; margin-top: 10px; font-weight: 700; opacity: 0.9; }

        .game-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 100%; max-width: 400px; margin: 25px auto; }
        .box { height: 110px; background: #1e293b; border-radius: 22px; display: flex; align-items: center; justify-content: center; font-size: 40px; cursor: pointer; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); border: 2px solid transparent; }
        .box.active { border-color: var(--primary); background: rgba(14, 165, 233, 0.1); transform: translateY(-5px); }
        .box.win { background: var(--success) !important; color: white; box-shadow: 0 0 20px var(--success); }
        .box.lose { background: var(--danger) !important; opacity: 0.5; }

        .play-now { width: 100%; max-width: 350px; padding: 20px; border-radius: 20px; border: none; background: linear-gradient(135deg, var(--primary), #6366f1); color: white; font-weight: 900; font-size: 18px; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 25px rgba(14, 165, 233, 0.3); }
        .play-now:disabled { opacity: 0.5; filter: grayscale(1); }
    </style>
</head>
<body>

    <div class="balance-card">
        <p style="margin:0; font-size: 14px; color: #94a3b8;">رصيدك المتوفر</p>
        <div class="balance-val"><span id="user-balance">0.00</span> <small style="font-size: 14px;">ج.م</small></div>
    </div>

    <div class="bet-area">
        <p style="font-size: 14px; margin-bottom: 10px; color: #94a3b8;">أدخل مبلغ الرهان</p>
        <div class="bet-input-container">
            <input type="number" id="bet-amount" value="10" min="1" oninput="updateWinEstimate()">
        </div>
        <div class="win-estimate" id="win-text">الجائزة عند الفوز: 12.00 ج.م</div>
    </div>

    <div class="game-grid">
        <div class="box" onclick="selectBox(0)" id="box-0"><i class="fas fa-question"></i></div>
        <div class="box" onclick="selectBox(1)" id="box-1"><i class="fas fa-question"></i></div>
        <div class="box" onclick="selectBox(2)" id="box-2"><i class="fas fa-question"></i></div>
    </div>

    <button class="play-now" id="play-btn" disabled onclick="startGame()">افتح الصندوق المختار</button>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, updateDoc, increment, runTransaction } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";
    import { getAuth } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAzcP_T8x5ouwwKkhadtBTdsUxk3XqwJec",
        authDomain: "vexa-4b2fb.firebaseapp.com",
        projectId: "vexa-4b2fb",
        appId: "1:977620445308:web:fec22230e1fbb30c8881f9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let balance = 0;
    let selectedIndex = null;
    let isPlaying = false;
    let attemptCounter = parseInt(sessionStorage.getItem('v_luck_idx') || "0");

    auth.onAuthStateChanged(user => {
        if (user) {
            onSnapshot(doc(db, "users", user.uid), (snap) => {
                balance = snap.data().walletBalance || 0;
                document.getElementById('user-balance').innerText = balance.toFixed(2);
            });
        }
    });

    // تحديث نص الجائزة المتوقعة
    window.updateWinEstimate = () => {
        const amt = parseFloat(document.getElementById('bet-amount').value) || 0;
        const win = amt * 1.2;
        document.getElementById('win-text').innerText = `الجائزة عند الفوز: ${win.toFixed(2)} ج.م`;
    };

    window.selectBox = (i) => {
        if(isPlaying) return;
        selectedIndex = i;
        document.querySelectorAll('.box').forEach(b => b.classList.remove('active'));
        document.getElementById(`box-${i}`).classList.add('active');
        document.getElementById('play-btn').disabled = false;
    };

    window.startGame = async () => {
        const bet = parseFloat(document.getElementById('bet-amount').value);
        if (isNaN(bet) || bet <= 0) return Swal.fire('خطأ', 'أدخل مبلغاً صحيحاً', 'error');
        if (bet > balance) return Swal.fire('عفواً', 'رصيدك غير كافٍ', 'error');

        isPlaying = true;
        document.getElementById('play-btn').disabled = true;
        document.getElementById('play-btn').innerText = "جاري فتح الصندوق...";

        // الخوارزمية: فوز مرة كل 3 محاولات
        attemptCounter++;
        sessionStorage.setItem('v_luck_idx', attemptCounter);
        
        let winningIndex;
        if (attemptCounter % 3 === 0) {
            winningIndex = selectedIndex; // فوز مضمون لضمان الاستمرارية
        } else {
            // نسبة فوز عشوائية 15% في المرات الأخرى
            winningIndex = (Math.random() < 0.15) ? selectedIndex : (selectedIndex + 1) % 3;
        }

        try {
            await runTransaction(db, async (ts) => {
                ts.update(doc(db, "users", auth.currentUser.uid), { walletBalance: increment(-bet) });
            });

            setTimeout(async () => {
                const boxes = document.querySelectorAll('.box');
                const isWin = selectedIndex === winningIndex;

                boxes.forEach((box, i) => {
                    box.innerHTML = (i === winningIndex) ? '<i class="fas fa-gem"></i>' : '<i class="fas fa-times"></i>';
                    if (i === winningIndex) box.classList.add('win');
                    else if (i === selectedIndex) box.classList.add('lose');
                });

                if (isWin) {
                    const winTotal = bet * 1.2;
                    await updateDoc(doc(db, "users", auth.currentUser.uid), { walletBalance: increment(winTotal) });
                    Swal.fire({ title: 'مبروك! 🎉', text: `ربحت ${winTotal.toFixed(2)} ج.م`, icon: 'success' });
                } else {
                    Swal.fire({ title: 'حظ أوفر', text: 'كانت قريبة! حاول مرة أخرى', icon: 'error' });
                }

                setTimeout(() => {
                    boxes.forEach(b => { b.className = 'box'; b.innerHTML = '<i class="fas fa-question"></i>'; });
                    isPlaying = false;
                    selectedIndex = null;
                    document.getElementById('play-btn').innerText = "افتح الصندوق المختار";
                    document.getElementById('play-btn').disabled = true;
                }, 2500);

            }, 1000);

        } catch (e) {
            isPlaying = false;
            document.getElementById('play-btn').disabled = false;
        }
    };
</script>
</body>
</html>
