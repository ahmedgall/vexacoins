<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vexa | السجل الموحد</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #0ea5e9; --bg: #020617; --card-bg: rgba(30, 41, 59, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08); --success: #10b981;
            --danger: #ef4444; --warning: #f59e0b; --text-main: #f8fafc; --text-dim: #94a3b8;
        }

        body {
            font-family: 'Cairo', sans-serif; background: radial-gradient(circle at top right, #0f172a, #020617);
            background-attachment: fixed; color: var(--text-main); margin: 0; padding: 20px 20px 100px; min-height: 100vh;
        }

        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .page-header h1 { font-size: 24px; font-weight: 900; margin: 0; }

        .history-container { display: flex; flex-direction: column; gap: 12px; max-width: 500px; margin: 0 auto; }

        .trx-card {
            background: var(--card-bg); backdrop-filter: blur(12px); border: 1px solid var(--glass-border);
            border-radius: 20px; padding: 15px; display: flex; align-items: center; gap: 12px;
            animation: slideUp 0.4s ease forwards; transition: 0.3s;
        }

        .icon-box {
            width: 48px; height: 48px; border-radius: 14px; display: flex;
            align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0;
        }

        /* تلوين الحالات والأنواع */
        .type-deposit { background: rgba(16, 185, 129, 0.15); color: var(--success); }
        .type-withdraw { background: rgba(245, 158, 11, 0.15); color: var(--warning); }
        .type-send { background: rgba(239, 68, 68, 0.15); color: var(--danger); }
        .type-receive { background: rgba(14, 165, 233, 0.15); color: var(--primary); }

        .info-box { flex-grow: 1; overflow: hidden; }
        .info-box .title { display: block; font-weight: 700; font-size: 15px; }
        .info-box .detail { font-size: 11px; color: var(--text-dim); display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .status-tag { 
            font-size: 9px; padding: 2px 6px; border-radius: 4px; margin-top: 4px; display: inline-block;
            font-weight: bold; text-transform: uppercase;
        }
        .status-pending { background: #f59e0b33; color: var(--warning); }
        .status-completed { background: #10b98133; color: var(--success); }
        .status-rejected { background: #ef444433; color: var(--danger); }

        .amount-box { text-align: left; min-width: 80px; }
        .amount-box .val { display: block; font-weight: 800; font-size: 15px; }
        .amount-box .date { font-size: 10px; color: var(--text-dim); }

        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="page-header">
        <div>
            <h1>سجل العمليات</h1>
            <span style="color: var(--text-dim); font-size: 12px;">تتبع شامل لجميع تحركات حسابك</span>
        </div>
        <button class="refresh-btn" style="background:none; border:none; color:var(--primary); cursor:pointer;" onclick="location.reload()"><i class="fas fa-sync-alt"></i></button>
    </div>

    <div id="loader" style="text-align: center; margin-top: 50px;"><i class="fas fa-spinner fa-spin fa-2x"></i></div>
    <div class="history-container" id="master-list"></div>
    <div id="empty-view" style="display:none; text-align:center; margin-top:100px; opacity:0.5;">
        <i class="fas fa-history fa-3x"></i><p>لا توجد أي عمليات مسجلة</p>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getFirestore, collection, query, where, onSnapshot, orderBy } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAzcP_T8x5ouwwKkhadtBTdsUxk3XqwJec",
        authDomain: "vexa-4b2fb.firebaseapp.com",
        projectId: "vexa-4b2fb",
        appId: "1:977620445308:web:fec22230e1fbb30c8881f9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
        if (user) { syncAllActivity(user.uid); } 
        else { window.location.href = 'index.html'; }
    });

    async function syncAllActivity(uid) {
        const listDiv = document.getElementById('master-list');
        const loader = document.getElementById('loader');
        
        let allData = [];

        // 1. مراقبة التحويلات (Transactions)
        const qTrx = query(collection(db, "transactions"), orderBy("timestamp", "desc"));
        // 2. مراقبة طلبات السحب والإيداع (withdrawRequests)
        const qReq = query(collection(db, "withdrawRequests"), where("uid", "==", uid));

        // دالة دمج البيانات ورسمها
        const refreshUI = () => {
            loader.style.display = 'none';
            // ترتيب البيانات تنازلياً حسب الوقت
            allData.sort((a, b) => (b.timeSort || 0) - (a.timeSort || 0));
            
            listDiv.innerHTML = '';
            if (allData.length === 0) { document.getElementById('empty-view').style.display = 'block'; return; }

            allData.forEach(item => {
                listDiv.innerHTML += renderCard(item);
            });
        };

        // مستمع لعمليات الإرسال والاستلام
        onSnapshot(qTrx, (snap) => {
            const trxs = [];
            snap.forEach(doc => {
                const d = doc.data();
                if (d.from === uid || d.to === uid) {
                    trxs.push({
                        ...d, id: doc.id,
                        category: d.from === uid ? 'send' : 'receive',
                        timeSort: d.timestamp?.seconds || 0,
                        displayDate: formatDate(d.timestamp)
                    });
                }
            });
            updateMainData('trx', trxs, refreshUI);
        });

        // مستمع لطلبات السحب والإيداع
        onSnapshot(qReq, (snap) => {
            const reqs = [];
            snap.forEach(doc => {
                const d = doc.data();
                reqs.push({
                    ...d, id: doc.id,
                    category: d.type === 'deposit' ? 'deposit' : 'withdraw',
                    timeSort: d.createdAt?.seconds || d.timestamp?.seconds || 0,
                    displayDate: formatDate(d.createdAt || d.timestamp)
                });
            });
            updateMainData('req', reqs, refreshUI);
        });

        let dataStore = { trx: [], req: [] };
        function updateMainData(key, data, callback) {
            dataStore[key] = data;
            allData = [...dataStore.trx, ...dataStore.req];
            callback();
        }
    }

    function renderCard(item) {
        let title, icon, colorClass, detail, amount, statusHtml = '';
        const statusLabels = { 'pending': 'قيد المراجعة', 'completed': 'مكتملة', 'rejected': 'مرفوضة' };
        const statusClass = item.status ? `status-${item.status}` : 'status-completed';

        if (item.category === 'send') {
            title = 'إرسال عملات'; icon = 'fa-paper-plane'; colorClass = 'type-send';
            detail = `إلى: ${item.toName || 'VX-' + item.to.substring(0,6)}`;
            amount = `-${item.amount} ${item.asset}`;
        } else if (item.category === 'receive') {
            title = 'استلام عملات'; icon = 'fa-wallet'; colorClass = 'type-receive';
            detail = `من: ${item.fromName || 'VX-' + item.from.substring(0,6)}`;
            amount = `+${item.amount} ${item.asset}`;
        } else if (item.category === 'deposit') {
            title = 'إيداع رصيد'; icon = 'fa-arrow-down-to-bracket'; colorClass = 'type-deposit';
            detail = `عبر: ${item.sender_phone || 'محفظة إلكترونية'}`;
            amount = `+${item.amount} ج.م`;
            statusHtml = `<span class="status-tag ${statusClass}">${statusLabels[item.status] || 'مكتمل'}</span>`;
        } else if (item.category === 'withdraw') {
            title = 'سحب كاش'; icon = 'fa-money-bill-transfer'; colorClass = 'type-withdraw';
            detail = `إلى: ${item.method}`;
            amount = `-${item.amount} ج.م`;
            statusHtml = `<span class="status-tag ${statusClass}">${statusLabels[item.status] || 'معلق'}</span>`;
        }

        return `
            <div class="trx-card">
                <div class="icon-box ${colorClass}"><i class="fas ${icon}"></i></div>
                <div class="info-box">
                    <span class="title">${title}</span>
                    <span class="detail">${detail}</span>
                    ${statusHtml}
                </div>
                <div class="amount-box">
                    <span class="val" style="color: ${amount.startsWith('+') ? 'var(--success)' : 'var(--danger)'}">${amount}</span>
                    <span class="date">${item.displayDate}</span>
                </div>
            </div>
        `;
    }

    function formatDate(ts) {
        if (!ts) return 'قيد التنفيذ...';
        return new Date(ts.seconds * 1000).toLocaleString('ar-EG', {
            day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit'
        });
    }
</script>
</body>
</html>
