<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vexa | سحب الأرباح</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #0ea5e9; --bg: #020617; --card: rgba(30, 41, 59, 0.6); --text-dim: #94a3b8; --danger: #ef4444; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; }
        
        .withdraw-card {
            background: var(--card); backdrop-filter: blur(15px); border-radius: 28px;
            padding: 25px; border: 1px solid rgba(255,255,255,0.1);
            max-width: 450px; margin: 20px auto;
        }

        .asset-item {
            background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 15px; padding: 15px; margin-bottom: 15px; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center; transition: 0.3s;
        }
        .asset-item.selected { border-color: var(--primary); background: rgba(14, 165, 233, 0.1); }

        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 8px; }
        
        input, select {
            width: 100%; padding: 15px; background: #0f172a; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px; color: white; font-family: 'Cairo'; outline: none; box-sizing: border-box;
        }

        .summary-box {
            background: rgba(0,0,0,0.3); padding: 15px; border-radius: 15px; font-size: 13px;
        }
        .summary-line { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .fee-tag { color: var(--danger); font-weight: 700; }

        .btn-withdraw {
            width: 100%; padding: 16px; border-radius: 15px; border: none;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white; font-weight: 800; cursor: pointer; margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="withdraw-card">
        <h2 style="text-align: center; margin-bottom: 5px;">سحب كاش</h2>
        <p style="text-align: center; color: var(--text-dim); font-size: 12px; margin-bottom: 25px;">حوّل عملاتك إلى جنيه مصري فوراً</p>

        <div class="input-group">
            <label>اختر العملة المراد بيعها</label>
            <select id="asset-to-sell">
                <option value="">جاري تحميل محفظتك...</option>
            </select>
        </div>

        <div class="input-group">
            <label>الكمية المراد سحبها (بالعملة)</label>
            <input type="number" id="withdraw-amount" placeholder="0.00" step="any">
            <small id="balance-hint" style="color: var(--primary); font-size: 11px;"></small>
        </div>

        <div class="summary-box">
            <div class="summary-line">
                <span>القيمة التقديرية:</span>
                <span id="estimated-value">0.00 ج.م</span>
            </div>
            <div class="summary-line">
                <span>رسوم السحب (1%):</span>
                <span class="fee-tag" id="fee-amount">0.00 ج.م</span>
            </div>
            <hr style="opacity: 0.1;">
            <div class="summary-line" style="font-size: 16px; font-weight: 800;">
                <span>ستستلم صافي:</span>
                <span style="color: #10b981;" id="final-receive">0.00 ج.م</span>
            </div>
        </div>

        <div class="input-group" style="margin-top: 20px;">
            <label>وسيلة الاستلام (فودافون كاش / انستا باي)</label>
            <input type="text" id="payment-details" placeholder="رقم المحفظة أو العنوان">
        </div>

        <button class="btn-withdraw" id="confirm-withdraw">تأكيد عملية السحب</button>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, collection, runTransaction, serverTimestamp, addDoc, getDoc } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";
    import { getAuth } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAzcP_T8x5ouwwKkhadtBTdsUxk3XqwJec",
        authDomain: "vexa-4b2fb.firebaseapp.com",
        projectId: "vexa-4b2fb",
        appId: "1:977620445308:web:fec22230e1fbb30c8881f9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let myAssets = {};
    let marketPrices = {};

    auth.onAuthStateChanged(user => {
        if (user) {
            // جلب الأصول الممتلكة
            onSnapshot(collection(db, "users", user.uid, "myAssets"), (snap) => {
                const select = document.getElementById('asset-to-sell');
                select.innerHTML = '<option value="">اختر عملة</option>';
                myAssets = {};
                snap.forEach(d => {
                    myAssets[d.id] = d.data();
                    select.innerHTML += `<option value="${d.id}">${d.data().name} (${d.data().symbol})</option>`;
                    
                    // جلب سعر السوق لهذه العملة
                    onSnapshot(doc(db, "marketCoins", d.id), (mSnap) => {
                        if(mSnap.exists()) marketPrices[d.id] = mSnap.data().price;
                    });
                });
            });
        }
    });

    // تحديث الحسابات عند تغيير الكمية أو العملة
    const calculate = () => {
        const assetId = document.getElementById('asset-to-sell').value;
        const amount = parseFloat(document.getElementById('withdraw-amount').value) || 0;
        
        if (assetId && marketPrices[assetId]) {
            const price = marketPrices[assetId];
            const totalEgp = amount * price;
            const fee = totalEgp * 0.01;
            const final = totalEgp - fee;

            document.getElementById('estimated-value').innerText = totalEgp.toFixed(2) + " ج.م";
            document.getElementById('fee-amount').innerText = fee.toFixed(2) + " ج.م";
            document.getElementById('final-receive').innerText = final.toFixed(2) + " ج.م";
            document.getElementById('balance-hint').innerText = `متاح لك: ${myAssets[assetId].amount.toFixed(4)}`;
        }
    };

    document.getElementById('withdraw-amount').oninput = calculate;
    document.getElementById('asset-to-sell').onchange = calculate;

    document.getElementById('confirm-withdraw').onclick = async () => {
        const assetId = document.getElementById('asset-to-sell').value;
        const amount = parseFloat(document.getElementById('withdraw-amount').value);
        const method = document.getElementById('payment-details').value.trim();

        if (!assetId || !amount || amount <= 0 || !method) return Swal.fire('تنبيه', 'أكمل كافة البيانات', 'warning');
        if (amount > myAssets[assetId].amount) return Swal.fire('خطأ', 'الكمية أكبر من رصيدك', 'error');

        const finalAmount = (amount * marketPrices[assetId] * 0.99).toFixed(2);

        const confirm = await Swal.fire({
            title: 'تأكيد السحب',
            text: `سيتم خصم ${amount} من رصيدك واستلام ${finalAmount} ج.م (بعد خصم 1% عمولة)`,
            icon: 'warning', showCancelButton: true
        });

        if (confirm.isConfirmed) {
            Swal.fire({ title: 'جاري المعالجة...', didOpen: () => Swal.showLoading() });
            
            try {
                await runTransaction(db, async (ts) => {
                    const assetRef = doc(db, "users", auth.currentUser.uid, "myAssets", assetId);
                    const snap = await ts.get(assetRef);
                    
                    // 1. خصم العملة من المحفظة
                    ts.update(assetRef, { amount: snap.data().amount - amount });

                    // 2. تسجيل طلب سحب (ليقوم المدير بمراجعته أو تنفيذه)
                    addDoc(collection(db, "transactions"), {
                        uid: auth.currentUser.uid,
                        type: 'withdraw',
                        asset: myAssets[assetId].symbol,
                        amount: amount,
                        egp_value: finalAmount,
                        method: method,
                        status: 'pending',
                        timestamp: serverTimestamp()
                    });
                });

                Swal.fire('تم طلب السحب', 'سيتم تحويل المبلغ لمحفظتك خلال دقائق', 'success');
            } catch (e) { Swal.fire('فشل', 'حدث خطأ أثناء المعالجة', 'error'); }
        }
    };
</script>
</body>
</html>
