<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vexa | سحب الرصيد</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #0ea5e9; --bg: #020617; --card: rgba(30, 41, 59, 0.6); --text-dim: #94a3b8; --success: #10b981; --danger: #ef4444; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; }
        .withdraw-card { background: var(--card); backdrop-filter: blur(20px); border-radius: 28px; padding: 30px; border: 1px solid rgba(255,255,255,0.1); max-width: 450px; margin: 40px auto; }
        .balance-box { background: rgba(14, 165, 233, 0.1); border-radius: 20px; padding: 20px; text-align: center; margin-bottom: 25px; border: 1px solid rgba(14, 165, 233, 0.2); }
        .balance-box b { font-size: 32px; color: var(--primary); }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 13px; color: var(--text-dim); margin-bottom: 8px; }
        input { width: 100%; padding: 15px; background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; color: white; outline: none; box-sizing: border-box; }
        .calc-box { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 15px; margin-bottom: 20px; font-size: 14px; }
        .btn-withdraw { width: 100%; padding: 18px; border-radius: 15px; border: none; background: linear-gradient(135deg, var(--success), #059669); color: white; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .btn-withdraw:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <div class="withdraw-card">
        <h2 style="text-align: center; margin-bottom: 10px;">سحب كاش</h2>
        <div class="balance-box">
            <small style="color:var(--text-dim)">رصيدك في المحفظة</small><br>
            <b id="display-balance">0.00</b> <small>ج.م</small>
        </div>

        <div class="input-group">
            <label>المبلغ المراد سحبه</label>
            <input type="number" id="withdraw-amount" placeholder="0.00">
        </div>

        <div class="calc-box">
            <div style="display:flex; justify-content:space-between"><span>رسوم السحب (1%):</span><span id="fee-text" style="color:var(--danger)">0.00 ج.م</span></div>
            <div style="display:flex; justify-content:space-between; margin-top:10px; font-weight:bold"><span>ستستلم صافي:</span><span id="net-text" style="color:var(--success)">0.00 ج.م</span></div>
        </div>

        <div class="input-group">
            <label>رقم الاستلام (فودافون كاش / انستا باي)</label>
            <input type="text" id="payout-details" placeholder="أدخل الرقم أو المعرف">
        </div>

        <button class="btn-withdraw" id="submit-btn">إرسال طلب السحب</button>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, runTransaction, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAzcP_T8x5ouwwKkhadtBTdsUxk3XqwJec",
        authDomain: "vexa-4b2fb.firebaseapp.com",
        projectId: "vexa-4b2fb",
        appId: "1:977620445308:web:fec22230e1fbb30c8881f9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let currentBalance = 0;

    // مراقبة حالة المستخدم وجلب رصيد walletBalance
    onAuthStateChanged(auth, (user) => {
        if (user) {
            onSnapshot(doc(db, "users", user.uid), (snap) => {
                if (snap.exists()) {
                    // التعديل هنا: قراءة walletBalance بناءً على الصورة
                    currentBalance = snap.data().walletBalance || 0;
                    document.getElementById('display-balance').innerText = currentBalance.toLocaleString('en-US', {minimumFractionDigits: 2});
                }
            });
        } else {
            window.location.href = 'index.html';
        }
    });

    // حساب الرسوم والصافي لحظياً
    document.getElementById('withdraw-amount').addEventListener('input', (e) => {
        const amt = parseFloat(e.target.value) || 0;
        const fee = amt * 0.01;
        document.getElementById('fee-text').innerText = fee.toFixed(2) + " ج.م";
        document.getElementById('net-text').innerText = (amt - fee > 0 ? amt - fee : 0).toFixed(2) + " ج.م";
    });

    // تنفيذ عملية السحب بنظام الـ Transaction
    document.getElementById('submit-btn').onclick = async () => {
        const amount = parseFloat(document.getElementById('withdraw-amount').value);
        const details = document.getElementById('payout-details').value.trim();

        if (!amount || amount < 10) return Swal.fire('تنبيه', 'أقل مبلغ للسحب هو 10 ج.م', 'warning');
        if (amount > currentBalance) return Swal.fire('خطأ', 'رصيدك الحالي لا يكفي لهذا المبلغ', 'error');
        if (!details) return Swal.fire('تنبيه', 'يرجى إدخال بيانات رقم الاستلام', 'warning');

        const confirm = await Swal.fire({ 
            title: 'تأكيد العملية؟', 
            text: `سيتم خصم ${amount} ج.م من رصيدك`, 
            icon: 'question', 
            showCancelButton: true,
            confirmButtonText: 'تأكيد',
            cancelButtonText: 'إلغاء'
        });

        if (confirm.isConfirmed) {
            Swal.fire({ title: 'جاري المعالجة...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            
            try {
                await runTransaction(db, async (transaction) => {
                    const userRef = doc(db, "users", auth.currentUser.uid);
                    const userSnap = await transaction.get(userRef);
                    
                    const dbBalance = userSnap.data().walletBalance || 0;
                    if (dbBalance < amount) throw "رصيد غير كافٍ في قاعدة البيانات";

                    // الخصم من walletBalance
                    transaction.update(userRef, { walletBalance: dbBalance - amount });
                    
                    // تسجيل الطلب في كولكشن جديد للمدير
                    const requestRef = collection(db, "withdrawRequests");
                    await addDoc(requestRef, {
                        uid: auth.currentUser.uid,
                        username: userSnap.data().username || "مستخدم غير معروف",
                        amount: amount,
                        netReceived: amount * 0.99,
                        method: details,
                        status: 'pending',
                        createdAt: serverTimestamp()
                    });
                });
                Swal.fire('نجاح', 'تم إرسال طلب السحب بنجاح، سيتم التحويل قريباً', 'success');
                document.getElementById('withdraw-amount').value = '';
                document.getElementById('payout-details').value = '';
            } catch (e) {
                Swal.fire('خطأ', 'حدثت مشكلة أثناء المعالجة: ' + e, 'error');
            }
        }
    };
</script>
</body>
</html>
